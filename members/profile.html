<!DOCTYPE HTML>
<html>
	<head>
		<title>My Profile - NZ Moguls Club</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="../assets/css/main.css" />
		<noscript><link rel="stylesheet" href="../assets/css/noscript.css" /></noscript>
		<link rel="icon" href="../images/favicon.ico" type="image/x-icon" />
	</head>
	<body class="is-preload">
		<div id="page-wrapper">
			<header id="header">
				<div class="logo-container">
					<a href="../index.html" class="logo-link">
						<img src="../images/logo.png" alt="NZ Moguls Club Icon" class="logo-icon">
					</a>
				</div>
				<nav id="nav">
					<ul>
						<li class="special">
							<a href="#menu" class="menuToggle"><span>Menu</span></a>
							<div id="menu">
								<ul>
									<li><a href="../index.html">Home</a></li>
									<li><a href="../about.html">About</a></li>
									<li><a href="../events.html">Events</a></li>
									<li><a href="../membership.html" id="menu-membership-link">Membership</a></li>
									<li><a href="../results-gallery.html">Results/Gallery</a></li>
									<li><a href="../contact.html">Contact</a></li>
									<li><a href="../login.html" class="button small fit" id="menu-auth-link">Member Login</a></li>
								</ul>
							</div>
						</li>
					</ul>
				</nav>
			</header>

			<article id="main">
				<header>
					<h2>Member Dashboard</h2>
					<p>Manage your personal details and competition entries</p>
				</header>
				<section class="wrapper style5">
					<div class="inner">
						<div class="row">
							<div class="col-4 col-12-medium">
								<section class="box">
									<h3>Membership Status</h3>
									<p><strong>Status:</strong> <span style="color: green;">Active</span><br />
									<strong>Type:</strong> Senior Athlete<br />
									<strong>Expiry:</strong> 31 Dec 2026</p>
									<ul class="actions stacked">
										<li><a href="#" class="button small fit">Renew Membership</a></li>
									</ul>
								</section>
							</div>
							<div class="col-8 col-12-medium">
								<section>
									<h3>Edit Profile</h3>
									<form method="post" action="#">
										<div class="row gtr-uniform">
											<div class="col-6 col-12-xsmall">
												<label for="firstName">First Name</label>
												<input type="text" id="firstName" value="" placeholder="First Name" />
											</div>
											<div class="col-6 col-12-xsmall">
												<label for="lastName">Last Name</label>
												<input type="text" id="lastName" value="" placeholder="Last Name" />
											</div>
											<div class="col-12">
												<label for="email">Email</label>
												<input type="email" id="email" value="" disabled />
											</div>
											<div class="col-6 col-12-xsmall">
												<label for="birthMonth">Birth Month</label>
												<select id="birthMonth">
													<option value="">- Month -</option>
												</select>
											</div>
											<div class="col-6 col-12-xsmall">
												<label for="birthYear">Birth Year</label>
												<select id="birthYear">
													<option value="">- Year -</option>
												</select>
											</div>
											<div class="col-12">
												<label for="memberType">Membership Type</label>
												<select id="memberType">
													<option value="">- Select Membership Type -</option>
													<option value="junior">Junior Athlete</option>
													<option value="senior">Senior Athlete</option>
													<option value="supporter">Supporter/Parent</option>
												</select>
											</div>
											<div class="col-12">
												<label for="guardian">Parent / Guardian Name</label>
												<input type="text" id="guardian" placeholder="Parent Name" />
											</div>
											<div class="col-12">
												<label for="phone">Contact Phone</label>
												<input type="text" id="phone" placeholder="Phone Number" />
											</div>
											<div class="col-12">
												<label for="bio">Short Bio (Athlete Experience)</label>
												<textarea name="bio" id="bio" rows="4"></textarea>
											</div>
											<div class="col-12">
												<ul class="actions fit">
													<li><input type="button" value="Save Changes" class="primary btn" /></li>
													<li><input type="button" value="Logout" class="btn logout-btn" /></li>
												</ul>
											</div>
										</div>
									</form>
								</section>
							</div>
						</div>
					</div>
				</section>
			</article>
		</div>
		<script src="../assets/js/jquery.min.js"></script>
		<script src="../assets/js/jquery.scrollex.min.js"></script>
		<script src="../assets/js/jquery.scrolly.min.js"></script>
		<script src="../assets/js/browser.min.js"></script>
		<script src="../assets/js/breakpoints.min.js"></script>
		<script src="../assets/js/util.js"></script>
		<script src="../assets/js/main.js"></script>
		<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
		<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
		<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
		<script src="../assets/js/firebase-init.js"></script>
		<script src="../assets/js/auth.js"></script>
		<script src="../assets/js/profile.js"></script>
	</body>
</html>
