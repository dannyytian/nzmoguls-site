<!DOCTYPE HTML>
<html>
	<head>
		<title>My Profile - NZ Moguls Club</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="../assets/css/main.css" />
		<noscript><link rel="stylesheet" href="../assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">
		<div id="page-wrapper">
			<header id="header">
				<h1><a href="../index.html">NZ Moguls Club</a></h1>
				<nav id="nav">
					<ul>
						<li class="special">
							<a href="#menu" class="menuToggle"><span>Menu</span></a>
							<div id="menu">
								<ul>
									<li><a href="../index.html">Home</a></li>
									<li><a href="../about.html">About</a></li>
									<li><a href="../events.html">Events</a></li>
									<li><a href="../membership.html">Membership</a></li>
									<li><a href="../results.html">Results/Gallery</a></li>
									<li><a href="../contact.html">Contact</a></li>
								</ul>
							</div>
						</li>
					</ul>
				</nav>
			</header>

			<article id="main">
				<header>
					<h2>Member Dashboard</h2>
					<p>Manage your personal details and competition entries</p>
				</header>
				<section class="wrapper style5">
					<div class="inner">
						<div class="row">
							<div class="col-4 col-12-medium">
								<section class="box">
									<h3>Membership Status</h3>
									<p><strong>Status:</strong> <span style="color: green;">Active</span><br />
									<strong>Type:</strong> Senior Athlete<br />
									<strong>Expiry:</strong> 31 Dec 2026</p>
									<ul class="actions stacked">
										<li><a href="#" class="button small fit">Renew Membership</a></li>
									</ul>
								</section>
							</div>
							<div class="col-8 col-12-medium">
								<section>
									<h3>Edit Profile</h3>
									<form method="post" action="#">
										<div class="row gtr-uniform">
											<div class="col-6 col-12-xsmall">
												<label for="p-first">First Name</label>
												<input type="text" id="p-first" value="John" />
											</div>
											<div class="col-6 col-12-xsmall">
												<label for="p-last">Last Name</label>
												<input type="text" id="p-last" value="Doe" />
											</div>
											<div class="col-12">
												<label for="p-email">Email</label>
												<input type="email" id="p-email" value="john.doe@example.com" />
											</div>
											<div class="col-12">
												<label for="p-bio">Short Bio (Athlete Experience)</label>
												<textarea name="p-bio" id="p-bio" rows="4"></textarea>
											</div>
											<div class="col-12">
												<ul class="actions">
													<li><input type="submit" value="Update Profile" class="primary" /></li>
												</ul>
											</div>
										</div>
									</form>
								</section>
							</div>
						</div>
					</div>
				</section>
			</article>
		</div>
		<script src="../assets/js/jquery.min.js"></script>
		<script src="../assets/js/main.js"></script>
	</body>
</html>
