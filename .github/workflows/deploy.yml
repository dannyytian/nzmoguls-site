name: Deploy to GitHub Pages

on:
  push:
    branches:
      - feat/supabase-migration  # 或者是你的默认分支名称

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: Inject Supabase Secrets
      #   run: |
      #     # 使用 sed 替换占位符。注意这里使用 | 作为分隔符，因为 URL 中包含 /
      #     sed -i "s|SUPABASE_URL_PLACEHOLDER|${{ secrets.SUPABASE_URL }}|g" assets/js/supabase-init.js
      #     sed -i "s|SUPABASE_ANON_KEY_PLACEHOLDER|${{ secrets.SUPABASE_ANON_KEY }}|g" assets/js/supabase-init.js
      - name: Inject Supabase Credentials
        run: |
          echo "=== 正在检查文件是否存在 ==="
          ls -la assets/js/ || echo "找不到 assets/js 文件夹！"
          
          echo "=== 开始替换占位符 ==="
          # 使用更安全的 bash 原生替换，或者带验证的 sed
          sed -i "s|{{SUPABASE_URL}}|${{ secrets.SUPABASE_URL }}|g" assets/js/supabase-init.js
          sed -i "s|{{SUPABASE_ANON_KEY}}|${{ secrets.SUPABASE_ANON_KEY }}|g" assets/js/supabase-init.js
          
          echo "=== 检查替换后的文件内容（仅显示前几行验证，不暴露完整 Key） ==="
          head -n 10 assets/js/supabase-init.js
      # - name: Inject Supabase Secrets
      #   run: |
      #     TARGET_FILE="assets/js/supabase-init.js"
          
      #     # 检查文件是否存在
      #     if [ ! -f "$TARGET_FILE" ]; then
      #       echo "Error: $TARGET_FILE not found!"
      #       exit 1
      #     fi
          
      #     # 执行替换
      #     sed -i "s|SUPABASE_URL_PLACEHOLDER|${{ secrets.SUPABASE_URL }}|g" "$TARGET_FILE"
      #     sed -i "s|SUPABASE_ANON_KEY_PLACEHOLDER|${{ secrets.SUPABASE_ANON_KEY }}|g" "$TARGET_FILE"
          
      #     # 验证是否还残留占位符，如果还有说明没替换成功
      #     if grep -q "SUPABASE_URL_PLACEHOLDER" "$TARGET_FILE"; then
      #       echo "Error: Failed to replace SUPABASE_URL_PLACEHOLDER"
      #       exit 1
      #     fi
      
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # 部署当前目录下所有文件
          branch: gh-pages # 部署到 gh-pages 分支
          clean: true # 自动清理不再需要的文件