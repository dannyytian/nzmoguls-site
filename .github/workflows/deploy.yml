name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 或者是你的默认分支名称

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase Secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # 使用 Node.js 正则表达式进行全局字面量替换
          node -e "
            const fs = require('fs');
            const filePath = 'assets/js/supabase-init.js';
            if (!process.env.SUPABASE_URL || !process.env.SUPABASE_ANON_KEY) {
              console.error('ERROR: GitHub Secrets SUPABASE_URL or SUPABASE_ANON_KEY is missing!');
              process.exit(1);
            }
            let content = fs.readFileSync(filePath, 'utf8');
            
            // 使用正则表达式确保精确匹配并替换所有实例
            const newContent = content
              .replace(/___SUPABASE_URL___/g, process.env.SUPABASE_URL)
              .replace(/___SUPABASE_ANON_KEY___/g, process.env.SUPABASE_ANON_KEY);
            
            fs.writeFileSync(filePath, newContent);
            console.log('Secrets injected into ' + filePath);
          "

      - name: Verify Secrets Injection
        run: |
          # 检查占位符是否仍然存在，如果存在则终止部署
          if grep -q "___SUPABASE_URL___" assets/js/supabase-init.js; then
            echo "ERROR: Placeholder ___SUPABASE_URL___ still found in assets/js/supabase-init.js!"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # 部署当前目录下所有文件
          branch: gh-pages # 部署到 gh-pages 分支
          clean: true # 自动清理不再需要的文件