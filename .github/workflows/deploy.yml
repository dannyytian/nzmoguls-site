name: Deploy to GitHub Pages

on:
  push:
    branches:
      -  feat/supabase-migration
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 使用更稳固的 Python 脚本进行替换，如果是 {{SUPABASE_URL}} 没变，这一步会直接报错卡死，不会默默通过
      - name: Inject Supabase Credentials via Python
        shell: python
        run: |
          import os

          url = """${{ secrets.SUPABASE_URL }}"""
          key = """${{ secrets.SUPABASE_ANON_KEY }}"""
          
          file_path = "assets/js/supabase-init.js"
          
          if not os.path.exists(file_path):
              raise FileNotFoundError(f"找不到文件: {file_path}")
              
          with open(file_path, "r", encoding="utf-8") as f:
              content = f.read()
              
          # 执行强行替换
          content = content.replace("{{SUPABASE_URL}}", url)
          content = content.replace("{{SUPABASE_ANON_KEY}}", key)
          
          with open(file_path, "w", encoding="utf-8") as f:
              f.write(content)
          print("=== Python 替换成功 ===")

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 显式打包当前根目录下的所有文件
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4