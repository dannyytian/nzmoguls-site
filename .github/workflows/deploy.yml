name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 或者是你的默认分支名称

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase Secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # 使用 Node.js 进行替换，处理特殊字符更稳健
          node -e "
            const fs = require('fs');
            const filePath = 'assets/js/supabase-init.js';
            let content = fs.readFileSync(filePath, 'utf8');
            content = content.replace('___SUPABASE_URL___', process.env.SUPABASE_URL);
            content = content.replace('___SUPABASE_ANON_KEY___', process.env.SUPABASE_ANON_KEY);
            fs.writeFileSync(filePath, content);
            console.log('Secrets injected into ' + filePath);
          "

      - name: Verify Secrets Injection
        run: |
          # 检查占位符是否仍然存在，如果存在则终止部署
          if grep -q "___SUPABASE_URL___" assets/js/supabase-init.js; then
            echo "ERROR: Placeholder ___SUPABASE_URL___ still found in assets/js/supabase-init.js!"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # 部署当前目录下所有文件
          branch: gh-pages # 部署到 gh-pages 分支
          clean: true # 自动清理不再需要的文件