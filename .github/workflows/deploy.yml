name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 或者是你的默认分支名称

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase Secrets
        env:
          S_URL: ${{ secrets.SUPABASE_URL }}
          S_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # 使用 sed 替换占位符。注意这里使用 | 作为分隔符，因为 URL 中包含 /
          sed -i "s|___SUPABASE_URL___|$S_URL|g" assets/js/supabase-init.js
          sed -i "s|___SUPABASE_ANON_KEY___|$S_KEY|g" assets/js/supabase-init.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # 部署当前目录下所有文件
          branch: gh-pages # 部署到 gh-pages 分支
          clean: true # 自动清理不再需要的文件