<!DOCTYPE HTML>
<html>
	<head>
		<title>Sign Up - NZ Moguls Club</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		<link rel="icon" href="images/favicon.ico" type="image/x-icon" />
	</head>
	<body class="is-preload">
		<div id="page-wrapper">
			<header id="header">
				<div class="logo-container">
					<a href="index.html" class="logo-link">
						<img src="images/logo.png" alt="NZ Moguls Club Icon" class="logo-icon">
					</a>
				</div>
				<nav id="nav">
					<ul>
						<li class="special">
							<a href="#menu" class="menuToggle"><span>Menu</span></a>
							<div id="menu">
								<ul>
									<li><a href="index.html">Home</a></li>
									<li><a href="about.html">About</a></li>
									<li><a href="events.html">Events</a></li>
									<li><a href="membership.html" id="menu-membership-link">Membership</a></li>
									<li><a href="results-gallery.html">Results/Gallery</a></li>
									<li><a href="contact.html">Contact</a></li>
									<li><a href="login.html" class="button small fit" id="menu-auth-link">Member Login</a></li>
								</ul>
							</div>
						</li>
					</ul>
				</nav>
			</header>

			<article id="main">
				<header>
					<h2>Join the Club</h2>
					<p>Register to participate in events and manage your membership</p>
				</header>
				<section class="wrapper style5">
					<div class="inner">
						<section>
							<h4>Create Your Account</h4>
							<form method="post" action="#">
								<div class="row gtr-uniform">
									<div class="col-6 col-12-xsmall">
										<input type="text" id="registerFirstName" placeholder="First Name" required />
									</div>
									<div class="col-6 col-12-xsmall">
										<input type="text" id="registerLastName" placeholder="Last Name" required />
									</div>
									<div class="col-12">
										<input type="email" id="registerEmail" placeholder="Email Address" required />
									</div>
									<div class="col-12">
										<input type="password" id="registerPassword" placeholder="Password" required />
									</div>
									<div class="col-12">
										<label>Date of Birth</label>
									</div>
									<div class="col-6 col-12-xsmall">
										<select id="registerBirthMonth">
											<option value="">- Month -</option>
										</select>
									</div>
									<div class="col-6 col-12-xsmall">
										<select id="registerBirthYear">
											<option value="">- Year -</option>
										</select>
									</div>
									<div class="col-12">
										<select id="registerMemberType">
											<option value="">- Select Membership Type -</option>
											<option value="junior">Junior Athlete</option>
											<option value="senior">Senior Athlete</option>
											<option value="supporter">Supporter/Parent</option>
										</select>
									</div>
									<div class="col-12">
										<ul class="actions">
											<li><input type="button" id="registerBtn" value="Register" class="primary" /></li>
											<li><a href="login.html" class="button">Already have an account?</a></li>
										</ul>
									</div>
								</div>
							</form>
						</section>
					</div>
				</section>
			</article>

			<footer id="footer">
				<ul class="copyright">
					<li>&copy; 2026 New Zealand Moguls Club Inc.</li>
				</ul>
			</footer>
		</div>
		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/jquery.scrollex.min.js"></script>
		<script src="assets/js/jquery.scrolly.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/main.js"></script>
		<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
		<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
		<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
		<script src="assets/js/firebase-init.js"></script>
		<script src="assets/js/auth.js"></script>
	</body>
</html>
